name: Submit New URLs to Bing

on:
  schedule:
    # Runs daily at 8:30 AM UTC. Change as needed.
    - cron: "30 8 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the seen-urls record back

jobs:
  submit-bing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Bing submission script
        env:
          SITEMAP_URL: "https://www.claritywithai.org/sitemap.xml"
          SITE_URL: "https://www.claritywithai.org"
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          SEEN_URLS_FILE: "bing-seen-urls.json"
        run: python submit_to_bing.py

      - name: Commit and push updated seen-urls record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- "$SEEN_FILE"; then
            git add "$SEEN_FILE"
            git commit -m "chore: update Bing seen-urls record"
            git push
          else
            echo "No changes to seen-urls record — nothing to commit."
          fi
        env:
          SEEN_FILE: "bing-seen-urls.json"
